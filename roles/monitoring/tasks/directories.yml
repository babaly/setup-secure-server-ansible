---
- name: Create monitoring directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
    owner: root
    group: root
  loop:
    - "{{ monitoring_dir }}"
    - "{{ monitoring_dir }}/prometheus"
    - "{{ monitoring_dir }}/prometheus/data"
    - "{{ monitoring_dir }}/grafana"
    - "{{ monitoring_dir }}/grafana/data"
    - "{{ monitoring_dir }}/grafana/provisioning"
    - "{{ monitoring_dir }}/grafana/provisioning/datasources"
    - "{{ monitoring_dir }}/grafana/provisioning/dashboards"
    - "{{ monitoring_dir }}/loki"
    - "{{ monitoring_dir }}/loki/data"
    - "{{ monitoring_dir }}/promtail"
    - "{{ monitoring_dir }}/dashboards"

- name: Set Grafana data directory ownership
  ansible.builtin.file:
    path: "{{ monitoring_dir }}/grafana/data"
    state: directory
    mode: "0755"
    owner: "472"
    group: "472"

- name: Set Prometheus data directory ownership
  ansible.builtin.file:
    path: "{{ monitoring_dir }}/prometheus/data"
    state: directory
    mode: "0755"
    owner: "65534"
    group: "65534"

- name: Set Loki data directory ownership
  ansible.builtin.file:
    path: "{{ monitoring_dir }}/loki/data"
    state: directory
    mode: "0755"
    owner: "10001"
    group: "10001"
